# ─────────────────────────────────────────────────────────────
# JARVIS Root Configuration
# Structured overrides live here; secrets always stay in .env
# ─────────────────────────────────────────────────────────────

jarvis:
  version: "0.1.0"

# ── Gateway ──────────────────────────────────────────────────
gateway:
  host: "127.0.0.1"
  port: 18789
  ping_interval_ms: 30000
  session_ttl_seconds: 86400       # 24 hours
  max_sessions: 50

# ── Ollama / LLM ─────────────────────────────────────────────
ollama:
  host: "http://127.0.0.1:11434"
  default_model: "llama3.2"
  fallback_model: "llama3.2:1b"
  context_window: 8192
  stream: true
  timeout_seconds: 120

# ── Loop Tiers ────────────────────────────────────────────────
loops:
  default_tier: "echo"             # echo | atlas | nexus | quantum
  auto_select: true                # let loop_selector choose based on task + hardware

  echo:
    enabled: true
    max_tokens: 2048
    quantization: "q4_k_m"

  atlas:
    enabled: false                 # enabled in Iteration 18
    shadow_passes: 2
    checkpoint: true

  nexus:
    enabled: false                 # enabled in Iteration 19
    validator_pool_size: 3
    rollback: true

  quantum:
    enabled: false                 # enabled in Iteration 22
    parallel_branches: 3
    validator_swarm_size: 10

# ── Memory ────────────────────────────────────────────────────
memory:
  hot:
    max_context_tokens: 4096
    entity_tracker: true
  cold:
    sqlite_path: "./data/memory/cold.db"
    faiss_index_path: "./data/memory/faiss.index"
    bm25_index_path: "./data/memory/bm25.pkl"
    embedding_model: "all-MiniLM-L6-v2"

# ── Voice ─────────────────────────────────────────────────────
voice:
  enabled: true
  stt:
    engine: "whisper.cpp"
    model: "base.en"
    language: "en"
  tts:
    engine: "piper"
    voice: "en_US-amy-medium"
    speed: 1.0
  vad:
    mode: 3                        # webrtcvad aggressiveness 0–3
    silence_threshold_ms: 700
  wake_word:
    model: "hey_jarvis"
    threshold: 0.5
  echo_cancel: true

# ── Channels ──────────────────────────────────────────────────
channels:
  discord:
    enabled: false
    command_prefix: "/"
  telegram:
    enabled: false
  whatsapp:
    enabled: false
  slack:
    enabled: false
  imessage:
    enabled: false
  matrix:
    enabled: false

# ── Skills ────────────────────────────────────────────────────
skills:
  sandbox: true
  max_execution_seconds: 30
  bundled_enabled:
    - browser
    - files
    - terminal
    - git
    - search
    - documents
  # email and calendar require OAuth setup:
  # email: false
  # calendar: false

# ── Task Queue ────────────────────────────────────────────────
queue:
  backend: "bullmq"
  redis_host: "127.0.0.1"
  redis_port: 6379
  concurrency: 4
  retry_attempts: 3

# ── UI ────────────────────────────────────────────────────────
ui:
  port: 5173
  theme: "dark"

# ── Logging ───────────────────────────────────────────────────
logging:
  level: "info"                    # debug | info | warn | error
  path: "./logs/jarvis.log"
  rotate: true
  max_size_mb: 50